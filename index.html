<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapati Express - Authentic Indian Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .auth-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .auth-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .google-signin-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .google-signin-btn:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }

        .demo-mode {
            background: #ff6b6b;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .menu-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .menu-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .menu-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .menu-item:hover {
            transform: translateY(-5px);
        }

        .menu-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .menu-item-content {
            padding: 20px;
        }

        .menu-item h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #333;
        }

        .menu-item p {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .menu-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ff6b6b;
        }

        .add-to-cart-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background: #45a049;
        }

        .cart-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .cart-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-total {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ff6b6b;
            text-align: center;
            margin-top: 20px;
        }

        .checkout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 20px auto;
        }

        .checkout-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .payment-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .payment-section h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .payment-section p {
            color: #666;
            margin-bottom: 16px;
        }

        .payment-qr {
            width: 260px;
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #eee;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .map-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .map-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        #map {
            height: 300px;
            border-radius: 8px;
        }

        .status-message {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍛 Chapati Express</h1>
            <p>Authentic Indian Food Delivery at Your Doorstep</p>
        </div>

        <div id="auth-section" class="auth-section">
            <h2>Welcome! Please Sign In</h2>
            <button id="google-signin-btn" class="google-signin-btn">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>
            <div id="demo-mode" class="demo-mode" style="display: none;">
                Running in Demo Mode - Firebase requires HTTP/HTTPS
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <div class="menu-section">
                <h2>Our Menu</h2>
                <div id="menu-grid" class="menu-grid">
                    <!-- Menu items will be populated by JavaScript -->
                </div>
            </div>

            <div class="cart-section">
                <h2>Your Cart</h2>
                <div id="cart-items">
                    <!-- Cart items will be populated by JavaScript -->
                </div>
                <div class="cart-total">
                    Total: $<span id="cart-total">0.00</span>
                </div>
                <button id="checkout-btn" class="checkout-btn">Place Order</button>

                <div class="payment-section">
                    <h3>Online Payment (PhonePe)</h3>
                    <p>After placing your order, scan this QR code and complete your payment.</p>
                    <img
                        class="payment-qr"
                        src="file:///C:/Users/VISHAL/.cursor/projects/C-Users-VISHAL-AppData-Local-Temp-555535c0-8f17-4e93-b8d1-95c95d1ab3fa/assets/c__Users_VISHAL_AppData_Roaming_Cursor_User_workspaceStorage_1775495684820_images_WhatsApp_Image_2026-04-10_at_2.37.03_AM-fa397042-d108-410d-8ada-73a2d5716f9f.png"
                        alt="PhonePe payment QR code"
                    >
                </div>
            </div>

            <div class="map-section">
                <h2>Find Us</h2>
                <div id="map"></div>
            </div>
        </div>

        <div id="status-message" class="status-message" style="display: none;"></div>
    </div>

    <script type="module">
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDUMMY_API_KEY_FOR_DEMO",
            authDomain: "chapati-express-demo.firebaseapp.com",
            projectId: "chapati-express-demo",
            storageBucket: "chapati-express-demo.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        let app = null;
        let auth = null;
        let db = null;
        let currentUser = null;

        // Initialize Firebase
        function initFirebase() {
            // Check if running on HTTP/HTTPS
            if (location.protocol !== 'http:' && location.protocol !== 'https:') {
                console.warn('Firebase requires HTTP/HTTPS protocol. Running in demo mode.');
                showDemoMode();
                return false;
            }

            try {
                // Import Firebase modules
                import('https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js').then(({ initializeApp }) => {
                    import('https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js').then(({ getAuth, GoogleAuthProvider, signInWithPopup }) => {
                        import('https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js').then(({ getFirestore, collection, addDoc, query, orderBy, onSnapshot }) => {
                            app = initializeApp(firebaseConfig);
                            auth = getAuth(app);
                            db = getFirestore(app);

                            // Set up auth state listener
                            auth.onAuthStateChanged((user) => {
                                if (user) {
                                    currentUser = user;
                                    showMainContent();
                                    loadMenu();
                                    initMap();
                                } else {
                                    showAuthSection();
                                }
                            });

                            // Set up sign-in button
                            document.getElementById('google-signin-btn').addEventListener('click', signInWithGoogle);
                        });
                    });
                });
                return true;
            } catch (error) {
                console.error('Firebase initialization failed:', error);
                showDemoMode();
                return false;
            }
        }

        // Sign in with Google
        async function signInWithGoogle() {
            if (!auth) {
                showStatus('Firebase not initialized. Please refresh the page.', 'error');
                return;
            }

            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({
                    prompt: 'select_account'
                });

                const result = await signInWithPopup(auth, provider);
                console.log('User signed in:', result.user);
                showStatus('Successfully signed in!', 'success');
            } catch (error) {
                console.error('Sign-in error:', error);
                showStatus('Sign-in failed. Please try again.', 'error');
            }
        }

        // Show demo mode
        function showDemoMode() {
            document.getElementById('demo-mode').style.display = 'block';
            document.getElementById('google-signin-btn').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadMenu();
            initMap();
        }

        // Show auth section
        function showAuthSection() {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        }

        // Show main content
        function showMainContent() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        // Show status message
        function showStatus(message, type) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = `status-message status-${type}`;
            statusEl.style.display = 'block';
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 5000);
        }

        // Menu data
        const menuItems = [
            {
                id: 1,
                name: 'Butter Chicken',
                description: 'Creamy tomato-based curry with tender chicken pieces',
                price: 12.99,
                image: 'https://images.unsplash.com/photo-1603894584373-5ac82b2ae391?w=400&h=300&fit=crop'
            },
            {
                id: 2,
                name: 'Paneer Tikka Masala',
                description: 'Grilled paneer cubes in rich spicy tomato gravy',
                price: 11.99,
                image: 'https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?w=400&h=300&fit=crop'
            },
            {
                id: 3,
                name: 'Lamb Vindaloo',
                description: 'Spicy Goan curry with tender lamb pieces',
                price: 14.99,
                image: 'https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=400&h=300&fit=crop'
            },
            {
                id: 4,
                name: 'Vegetable Biryani',
                description: 'Fragrant basmati rice with mixed vegetables and spices',
                price: 9.99,
                image: 'https://images.unsplash.com/photo-1563379091339-03246963d96c?w=400&h=300&fit=crop'
            },
            {
                id: 5,
                name: 'Chicken Tikka',
                description: 'Marinated chicken skewers grilled to perfection',
                price: 13.99,
                image: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400&h=300&fit=crop'
            },
            {
                id: 6,
                name: 'Aloo Gobi',
                description: 'Cauliflower and potato curry with aromatic spices',
                price: 8.99,
                image: 'https://images.unsplash.com/photo-1589647363585-f4a7d3877daf?w=400&h=300&fit=crop'
            }
        ];

        // Cart
        let cart = [];

        // Load menu
        function loadMenu() {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = '';

            menuItems.forEach(item => {
                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';
                menuItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="menu-item-content">
                        <h3>${item.name}</h3>
                        <p>${item.description}</p>
                        <div class="menu-item-footer">
                            <span class="price">$${item.price.toFixed(2)}</span>
                            <button class="add-to-cart-btn" onclick="addToCart(${item.id})">Add to Cart</button>
                        </div>
                    </div>
                `;
                menuGrid.appendChild(menuItem);
            });
        }

        // Add to cart
        function addToCart(itemId) {
            const item = menuItems.find(item => item.id === itemId);
            if (item) {
                cart.push(item);
                updateCart();
                showStatus(`${item.name} added to cart!`, 'success');
            }
        }

        // Update cart display
        function updateCart() {
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');

            cartItems.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <span>${item.name}</span>
                    <span>$${item.price.toFixed(2)}</span>
                `;
                cartItems.appendChild(cartItem);
            });

            cartTotal.textContent = total.toFixed(2);
        }

        // Checkout
        document.getElementById('checkout-btn').addEventListener('click', () => {
            if (cart.length === 0) {
                showStatus('Your cart is empty!', 'error');
                return;
            }

            if (!currentUser && location.protocol === 'http:' || location.protocol === 'https:') {
                showStatus('Please sign in to place an order.', 'error');
                return;
            }

            // In demo mode or with user, proceed with order
            const order = {
                items: cart,
                total: cart.reduce((sum, item) => sum + item.price, 0),
                timestamp: new Date(),
                userId: currentUser ? currentUser.uid : 'demo-user'
            };

            if (db && currentUser) {
                // Save to Firestore
                addDoc(collection(db, 'orders'), order)
                    .then(() => {
                        showStatus('Order placed successfully!', 'success');
                        cart = [];
                        updateCart();
                    })
                    .catch((error) => {
                        console.error('Error placing order:', error);
                        showStatus('Failed to place order. Please try again.', 'error');
                    });
            } else {
                // Demo mode
                showStatus('Order placed successfully! (Demo mode)', 'success');
                cart = [];
                updateCart();
            }
        });

        // Initialize map
        function initMap() {
            // Load Leaflet
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/leaflet@1.7.1/dist/leaflet.js';
            script.onload = () => {
                const map = L.map('map').setView([40.7128, -74.0060], 13); // New York coordinates as example

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                L.marker([40.7128, -74.0060]).addTo(map)
                    .bindPopup('Chapati Express<br>123 Main St, New York, NY')
                    .openPopup();
            };
            document.head.appendChild(script);
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
        });

        // Make addToCart global for onclick
        window.addToCart = addToCart;
    </script>
</body>
</html>
